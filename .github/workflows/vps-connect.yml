name: VPS Deploy & Connect

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      command:
        description: '要在 VPS 上执行的命令'
        required: false
        default: 'echo ok && uptime && df -h'

jobs:
  connect-vps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH Connection (key auth)
        id: ssh_key
        continue-on-error: true
        run: |
          ssh -o ConnectTimeout=15 -o StrictHostKeyChecking=no \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo '✅ SSH Key 登录成功' && whoami && uptime"

      - name: Fallback - Password Auth (bootstrap)
        if: steps.ssh_key.outcome == 'failure'
        run: |
          sudo apt-get install -y sshpass -q
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh \
            -o ConnectTimeout=15 -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo '✅ 密码登录成功' && mkdir -p ~/.ssh && chmod 700 ~/.ssh && echo '${{ secrets.VPS_SSH_PUB }}' >> ~/.ssh/authorized_keys && sort -u ~/.ssh/authorized_keys -o ~/.ssh/authorized_keys && echo '🔑 公钥已添加'"

      - name: Run Command on VPS
        run: |
          ssh -o ConnectTimeout=15 -o StrictHostKeyChecking=no \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "${{ github.event.inputs.command || 'echo ok && uptime && df -h' }}"
