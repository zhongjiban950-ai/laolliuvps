name: Bootstrap VPS SSH Key

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Add SSH Public Key via Password
        run: |
          sudo apt-get install -y sshpass -q
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p ~/.ssh && chmod 700 ~/.ssh && \
             echo '${{ secrets.VPS_SSH_PUB }}' >> ~/.ssh/authorized_keys && \
             sort -u ~/.ssh/authorized_keys -o ~/.ssh/authorized_keys && \
             chmod 600 ~/.ssh/authorized_keys && \
             echo '✅ 公钥添加成功' && \
             cat ~/.ssh/authorized_keys"

      - name: Verify Key Auth Works
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -o ConnectTimeout=15 -o StrictHostKeyChecking=no \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo '🔑 密钥认证成功！' && whoami"
